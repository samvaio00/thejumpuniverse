name: Daily Gazette Generation

on:
  schedule:
    - cron: '1 0 * * *'  # 00:01 UTC daily
  workflow_dispatch:      # Manual trigger
  push:
    branches:
      - main
    paths:
      - 'generate.py'
      - '.github/workflows/daily.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate the day's 8 universes (deterministic picks from the 100)
        env:
          GENERATE_IMAGES: "true"
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate.py --all

      - name: Commit and push
        run: |
          git config user.name "Gazette Bot"
          git config user.email "bot@thejumpuniverse.com"
          git add editions/ sitemap.xml rss.xml index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily edition: $(date +%Y-%m-%d)"
          git push
