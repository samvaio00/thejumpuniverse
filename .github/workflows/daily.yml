name: Daily Gazette Generation

on:
  schedule:
    - cron: '1 0 * * *'  # 00:01 UTC daily
  workflow_dispatch:      # Manual trigger
  push:
    branches:
      - main
    paths:
      - 'generate.py'
      - '.github/workflows/daily.yml'

permissions:
  contents: write

concurrency:
  group: daily-gazette-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests boto3 pillow

      - name: Generate the day's 8 universes (deterministic picks from the 100)
        env:
          GENERATE_IMAGES: "true"
          GAZETTE_PARALLEL: "4"
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python generate.py --all

      - name: Commit and push
        run: |
          git config user.name "Gazette Bot"
          git config user.email "bot@thejumpuniverse.com"
          git add editions/ edition/ sitemap.xml rss.xml index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily edition: $(date +%Y-%m-%d)"
          # The generation step runs ~20 min; main may have moved. Rebase and retry
          # so a mid-run commit on main no longer loses the day's editions.
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying..."
            sleep 10
          done
