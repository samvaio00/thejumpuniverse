name: Apply SEO fixes

on:
  push:
    paths:
      - ".github/workflows/seo-fixes.yml"
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  seo-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix domain references
        run: |
          sed -i 's/multiversegazette\.com/thejumpuniverse.com/g' \
            generate.py index.html sitemap.xml robots.txt rss.xml multiverse_gazette.html

      - name: Fix _redirects passthrough
        run: |
          python3 << 'PYEOF'
          p = '_redirects'
          s = open(p).read()
          lines = [
              "# Serve crawler/static files directly — they must NOT be caught by the /:date rule below",
              "/robots.txt  /robots.txt  200",
              "/sitemap.xml  /sitemap.xml  200",
              "/rss.xml  /rss.xml  200",
              "/index.html  /index.html  200",
              "/multiverse_gazette.html  /multiverse_gazette.html  200",
              "/favicon.ico  /favicon.ico  200",
              "/logo.png  /logo.png  200",
              "",
          ]
          block = "\n".join(lines) + "\n"
          marker = "# Redirect /2026-07-03 to the default timeline for that date"
          if "/robots.txt  /robots.txt  200" not in s:
              s = s.replace(marker, block + marker)
              open(p, 'w').write(s)
          PYEOF

      - name: Apply SEO keywords and metadata
        run: |
          python3 << 'PYEOF'
          import re

          KW = "galactic news, multiverse news, multi verse, alternate history, conspiracy theory, conspiracy theories, parallel universe, parallel universes, alternate timeline, satirical newspaper, news parody, sci-fi news, speculative fiction, alternate reality, what if history, daily satire, funny news"

          h = open('index.html').read()
          h = re.sub(r'<meta name="keywords" content="[^"]*">', f'<meta name="keywords" content="{KW}">', h)
          h = h.replace(
            'A satirical dispatch from a universe where',
            'Satirical galactic news from the multiverse — an alternate history dispatch from a universe where')
          h = h.replace(
            '"publisher": {"@type": "Organization", "name": "The Multiverse Gazette"',
            '"keywords": "galactic news, multiverse, multi verse, alternate history, conspiracy theory, parallel universe, satire", "genre": ["Satire", "Alternate History", "Science Fiction"], "publisher": {"@type": "Organization", "name": "The Multiverse Gazette"')
          new_footer = (
              '<div class="footer-links">\n'
              '                <a href="/rss.xml">RSS Feed</a>\n'
              '            </div>\n'
              '            <p style="margin-top: 8px; font-size: 0.78rem; opacity: 0.6;">'
              'The Multiverse Gazette — daily galactic news, conspiracy theories, and alternate history '
              'dispatches from parallel universes across the multi-verse.</p>'
          )
          if 'daily galactic news, conspiracy theories' not in h:
              h = re.sub(r'<div class="footer-links">.*?</div>', new_footer, h, count=1, flags=re.S)
          open('index.html', 'w').write(h)

          m = open('multiverse_gazette.html').read()
          m = re.sub(r'<meta name="keywords" content="[^"]*">', f'<meta name="keywords" content="{KW}">', m)
          open('multiverse_gazette.html', 'w').write(m)

          g = open('generate.py').read()
          g = g.replace(
            'desc = f"{edition[\'deck\']} — A satirical dispatch from a universe where {edition[\'divergence\']}."',
            'desc = f"{edition[\'deck\']} — Satirical galactic news from the multiverse — an alternate history dispatch from a universe where {edition[\'divergence\']}."')
          g = g.replace(
            '"author": {"@type": "Person", "name": edition.get("author", "Staff Correspondent")},',
            '"author": {"@type": "Person", "name": edition.get("author", "Staff Correspondent")},\n        "keywords": "galactic news, multiverse, multi verse, alternate history, conspiracy theory, parallel universe, satire",\n        "genre": ["Satire", "Alternate History", "Science Fiction"],')
          open('generate.py', 'w').write(g)
          PYEOF

      - name: Generate logo.png
        run: |
          pip install --quiet pillow
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          W, H = 600, 120
          img = Image.new("RGB", (W, H), "#f7f4ed")
          d = ImageDraw.Draw(img)
          try:
              f1 = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSerif-Bold.ttf", 44)
              f2 = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSerif-Italic.ttf", 16)
          except Exception:
              f1 = f2 = ImageFont.load_default()
          t = "The Multiverse Gazette"
          w = d.textlength(t, font=f1)
          d.text(((W - w) // 2, 22), t, fill="#121212", font=f1)
          s = "Galactic News · Alternate History · Every Universe, Daily"
          w2 = d.textlength(s, font=f2)
          d.text(((W - w2) // 2, 80), s, fill="#7a0000", font=f2)
          d.rectangle([0, 0, W - 1, H - 1], outline="#121212", width=3)
          img.save("logo.png", optimize=True)
          PYEOF

      - name: Sanity check
        run: |
          python3 -m py_compile generate.py
          grep -q "thejumpuniverse.com/sitemap.xml" robots.txt
          grep -q "galactic news" index.html
          ! grep -rq "multiversegazette.com" index.html sitemap.xml robots.txt rss.xml generate.py

      - name: Commit changes
        run: |
          git config user.name "seo-fixes[bot]"
          git config user.email "samvaiotmp@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "SEO: fix domain to thejumpuniverse.com; add galactic news / multiverse / conspiracy theory / alternate history keywords; fix redirect hijack; add logo"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: thejumpuniverse
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
