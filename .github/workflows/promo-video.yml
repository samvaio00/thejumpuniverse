name: Build promo video

on:
  workflow_dispatch:

jobs:
  promo:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install Python dependencies
        run: pip install requests boto3 pillow openai

      - name: Build promo video
        env:
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python scripts/make_promo.py

      - name: Upload promo.mp4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: multiverse-gazette-promo
          path: promo_build/promo.mp4
          if-no-files-found: error

      - name: Upload intermediate assets (debugging aid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promo-build-intermediates
          path: |
            promo_build/narration.mp3
            promo_build/endcard.png
          if-no-files-found: ignore
