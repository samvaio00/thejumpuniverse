name: Backfill Edition Images

on:
  workflow_dispatch:
    inputs:
      dates:
        description: 'Comma-separated dates (YYYY-MM-DD) to generate missing images for'
        required: true

permissions:
  contents: write

concurrency:
  group: gazette-content-${{ github.ref }}
  cancel-in-progress: false

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate missing images
        env:
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          IFS=',' read -ra DATES <<< "${{ inputs.dates }}"
          for d in "${DATES[@]}"; do
            python generate.py --images-only --date "$(echo "$d" | xargs)"
          done

      - name: Commit and push
        run: |
          git config user.name "Gazette Bot"
          git config user.email "bot@thejumpuniverse.com"
          git add editions/ edition/ sitemap.xml rss.xml index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Backfill images: ${{ inputs.dates }}"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
